apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = true

// Only true once a real keystore file has been placed at android/app/ and
// the AERO_UPLOAD_STORE_FILE property points at it. Until then, release
// builds fall back to debug signing so CI/local builds still succeed —
// see docs/developer-guide.md#signing before shipping a real release.
def hasReleaseKeystore = project.hasProperty('AERO_UPLOAD_STORE_FILE') &&
    file("${AERO_UPLOAD_STORE_FILE}").exists()

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.afmtechnologies.aero"

    defaultConfig {
        applicationId "com.afmtechnologies.aero"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }

    signingConfigs {
        release {
            if (hasReleaseKeystore) {
                storeFile file(AERO_UPLOAD_STORE_FILE)
                storePassword project.hasProperty('AERO_UPLOAD_STORE_PASSWORD') ? AERO_UPLOAD_STORE_PASSWORD : ""
                keyAlias project.hasProperty('AERO_UPLOAD_KEY_ALIAS') ? AERO_UPLOAD_KEY_ALIAS : ""
                keyPassword project.hasProperty('AERO_UPLOAD_KEY_PASSWORD') ? AERO_UPLOAD_KEY_PASSWORD : ""
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Falls back to debug signing until a real release keystore exists.
            signingConfig hasReleaseKeystore ? signingConfigs.release : signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")
    implementation platform("com.google.firebase:firebase-bom:33.1.0")
}

// Only applied once android/app/google-services.json actually exists — see
// docs/installation.md. Without this guard, Gradle fails immediately for
// anyone who hasn't configured Firebase yet.
if (file("google-services.json").exists()) {
    apply plugin: "com.google.gms.google-services"
}
